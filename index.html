<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Quake Clone - Final Fix</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #111111;
            --accent: #ff3333;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) { body { flex-direction: row; } }

        #map-viewport {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #map-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            /* アニメーションを少しゆっくりにして確認しやすくする */
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #kmoni-img {
            max-width: 100%;
            max-height: 95%;
            object-fit: contain;
            filter: brightness(1.2);
            pointer-events: none;
        }

        #wave-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #info-panel {
            background: var(--panel-bg);
            border-top: 2px solid #333;
            padding: 15px;
            z-index: 10;
            height: 250px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            #info-panel { width: 350px; height: 100%; border-top: none; border-left: 2px solid #333; }
        }

        #hypocenter { font-size: 1.6rem; font-weight: bold; margin: 5px 0; }
        .shindo-box {
            background: var(--accent);
            font-size: 4rem;
            text-align: center;
            border-radius: 8px;
            font-weight: 900;
            margin: 10px 0;
        }
        .label { color: #888; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="map-viewport">
    <div id="map-stage">
        <img id="kmoni-img" src="" alt="Map Loading...">
        <canvas id="wave-canvas"></canvas>
    </div>
</div>

<div id="info-panel">
    <div class="label" style="color:var(--accent)">EARTHQUAKE REPORT</div>
    <div id="hypocenter">待機中...</div>
    <div class="label">最大震度</div>
    <div id="max-int" class="shindo-box">--</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div><div class="label">規模</div><div id="mag" style="font-weight:bold;">--</div></div>
        <div><div class="label">深さ</div><div id="depth" style="font-weight:bold;">--</div></div>
    </div>
    <div style="margin-top:auto; font-size:0.7rem; color:#444; text-align:right;">
        Clock: <span id="clock">00:00:00</span>
    </div>
</div>

<script>
    const stage = document.getElementById('map-stage');
    const kmoniImg = document.getElementById('kmoni-img');
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    let currentEEW = null;
    let lastEventId = "";

    function updateKmoni() {
        const now = new Date(Date.now() - 15000);
        const Y = now.getFullYear();
        const M = String(now.getMonth() + 1).padStart(2, '0');
        const D = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const rawUrl = `www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${Y}${M}${D}/${Y}${M}${D}${h}${m}${s}.jma_s.gif`;
        kmoniImg.src = `https://images.weserv.nl/?url=${rawUrl}&noshp`;
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }

    async function fetchEEW() {
        try {
            const res = await fetch('https://api.wolfx.jp/jma_eew.json');
            const data = await res.json();
            if (!data || data.Title === "Dummy") return;

            if (data.EventID !== lastEventId) {
                document.getElementById('hypocenter').innerText = data.Hypocenter;
                document.getElementById('max-int').innerText = data.MaxIntensity;
                document.getElementById('mag').innerText = "M" + data.Magunitude;
                document.getElementById('depth').innerText = data.Depth + "km";
                
                // --- 修正版：ズーム座標計算 ---
                focusHypocenter(data.Latitude, data.Longitude);
                
                currentEEW = data;
                lastEventId = data.EventID;
            }
        } catch (e) {}
    }

    function focusHypocenter(lat, lon) {
        if (!lat || !lon) return;

        // 地図の基準点（日本の中央付近：東経137.5度、北緯37.5度）
        const baseLon = 137.5;
        const baseLat = 37.5;

        // 移動量の計算（画面サイズに合わせて倍率を調整）
        // 右上に飛ぶのを防ぐため、引き算の順序と方向を修正
        const moveX = (baseLon - parseFloat(lon)) * (window.innerWidth / 20);
        const moveY = (parseFloat(lat) - baseLat) * (window.innerHeight / 15);

        const zoomScale = 1.6; // ズームしすぎないように設定

        // 適用
        stage.style.transform = `scale(${zoomScale}) translate(${moveX}px, ${moveY}px)`;
    }

    function drawWaves() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentEEW) {
            const lon = parseFloat(currentEEW.Longitude);
            const lat = parseFloat(currentEEW.Latitude);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 波紋の描画位置もズーム計算に合わせる
            const mapX = (lon - 137.5) * (canvas.width / 20) + centerX;
            const mapY = (37.5 - lat) * (canvas.height / 15) + centerY;

            const elapsed = (Date.now() - new Date(currentEEW.OriginTime).getTime()) / 1000;

            if (elapsed > 0 && elapsed < 180) {
                ctx.beginPath();
                ctx.arc(mapX, mapY, elapsed * 40, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0, 180, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(mapX, mapY, elapsed * 22, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 50, 50, 0.8)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }
        requestAnimationFrame(drawWaves);
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }

    window.onresize = resize;
    resize();
    setInterval(updateKmoni, 2000);
    setInterval(fetchEEW, 5000);
    updateKmoni();
    fetchEEW();
    drawWaves();
</script>
</body>
</html>
