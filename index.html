<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地震情報 for Gemini</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #111; --font: 'DotGothic16', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: var(--font); overflow: hidden; display: flex; flex-direction: column; }
        @media (min-width: 768px) { body { flex-direction: row; } }

        /* 右側パネル */
        #info-panel { background: var(--panel); border-top: 2px solid #333; padding: 15px; z-index: 10; height: 450px; display: flex; flex-direction: column; box-sizing: border-box; }
        @media (min-width: 768px) { #info-panel { width: 360px; height: 100%; border-top: none; border-left: 2px solid #333; } }
        
        /* 震度別カラー (CSS変数化) */
        .int-1, .int-2 { --int-color: #4caf50; --text-color: #fff; } /* 緑 */
        .int-3, .int-4 { --int-color: #fbc02d; --text-color: #000; } /* 黄 */
        .int-5, .int-55, .int-6, .int-65, .int-7 { --int-color: #d32f2f; --text-color: #fff; } /* 赤 */
        .int-default { --int-color: #444; --text-color: #fff; }

        /* メインUI要素 */
        #hypocenter { font-size: 1.8rem; font-weight: bold; border-bottom: 1px solid #444; }
        #time-display { font-size: 1.1rem; margin: 5px 0; color: #aaa; }
        #max-int-label { font-size: 0.8rem; font-weight: bold; margin-top: 5px; }
        .shindo-box { background: var(--int-color, #444); color: var(--text-color, #fff); font-size: 5rem; text-align: center; border-radius: 4px; font-weight: 900; margin: 5px 0; line-height: 1.1; border: 2px solid #fff; transition: background 0.5s; }
        #status-display { font-size: 0.9rem; font-weight: bold; margin-top: auto; opacity: 0.8; padding-bottom: 5px; }

        /* マグニチュード・震源の深さ */
        .data-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom: 10px; }
        .data-label { color:#888; font-size:0.7rem; }
        .data-value { font-size:1.4rem; }

        /* 強震モニタと波形 */
        #map-viewport { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
        #map-stage { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .kmoni-layer { position: absolute; width: 100%; height: 100%; object-fit: contain; filter: brightness(1.2); opacity: 0; z-index: 1; transition: opacity 0.3s; }
        .active { opacity: 1; z-index: 2; }
        #wave-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 履歴リスト */
        #history-section { border-top: 1px dashed #444; padding-top: 10px; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        #history-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        #history-list { flex: 1; overflow-y: auto; font-size: 0.85rem; }
        .history-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .history-shindo { font-weight: bold; width: 40px; text-align: center; border-radius: 2px; background: var(--int-color); color: var(--text-color); }
    </style>
</head>
<body id="main-body">

<div id="map-viewport">
    <div id="map-stage">
        <img id="kmoni-1" class="kmoni-layer active" src="">
        <img id="kmoni-2" class="kmoni-layer" src="">
        <canvas id="wave-canvas"></canvas>
    </div>
</div>

<div id="info-panel">
    <div id="hypocenter">---</div>
    <div id="time-display">--時--分頃 発生</div>
    
    <div id="max-int-label">最大震度</div>
    <div id="max-int" class="shindo-box int-default">--</div>
    
    <div class="data-grid">
        <div><div class="data-label">MAGNITUDE</div><div id="mag" class="data-value">--</div></div>
        <div><div class="data-label">DEPTH</div><div id="depth" class="data-value">--</div></div>
    </div>

    <div id="history-section">
        <div id="history-label">震源履歴 (最新5件)</div>
        <div id="history-list"></div>
    </div>
    
    <div id="status-display">CONNECTED TO P2P...</div>
    <div style="font-size:0.8rem; color:#444; text-align:right;">
        CLOCK: <span id="clock">00:00:00</span>
    </div>
</div>

<script>
    // グローバル変数と定数マップ
    let activeLayerNum = 1;
    let delaySeconds = 25; // 強震モニタの初期タイムラグ
    let currentEvent = null; // 波形描画用の最新地震データ

    const scaleMap = { 10: "1", 20: "2", 30: "3", 40: "4", 45: "5弱", 50: "5強", 55: "6弱", 60: "6強", 70: "7" };
    const classMap = { 10: "int-1", 20: "int-2", 30: "int-3", 40: "int-4", 45: "int-5", 50: "int-55", 55: "int-6", 60: "int-65", 70: "int-7" };

    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    // 1. 強震モニタのタイムラグ自動調整
    function updateKmoni() {
        const now = new Date(Date.now() - (delaySeconds * 1000));
        const Y = now.getFullYear();
        const M = String(now.getMonth() + 1).padStart(2, '0');
        const D = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const rawUrl = `www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${Y}${M}${D}/${Y}${M}${D}${h}${m}${s}.jma_s.gif`;
        const nextUrl = `https://images.weserv.nl/?url=${rawUrl}&noshp`;

        const nextNum = (activeLayerNum === 1) ? 2 : 1;
        const nextImg = document.getElementById(`kmoni-${nextNum}`);
        const currentImg = document.getElementById(`kmoni-${activeLayerNum}`);

        nextImg.onerror = () => {
            // 画像がない場合はタイムラグを増やして再試行
            console.warn(`Delay ${delaySeconds}s is short. Retrying with ${delaySeconds + 1}s...`);
            delaySeconds++;
            if(delaySeconds > 60) delaySeconds = 25; // 1分以上遅れるならリセット
        };

        nextImg.onload = () => {
            nextImg.style.opacity = 1;
            nextImg.classList.add('active');
            currentImg.style.opacity = 0;
            currentImg.classList.remove('active');
            activeLayerNum = nextNum;
            // スムーズに読み込めていたら、少しずつ最新に近づける
            if(delaySeconds > 22) delaySeconds -= 0.1; 
        };

        nextImg.src = nextUrl;
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    // 2. P2P地震情報APIから取得
    async function fetchP2P() {
        try {
            // codes=551（地震情報）を最新5件取得
            const res = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=5');
            const data = await res.json();
            if (data && data.length > 0) {
                updateUI(data[0]); // 最新の1件をメインに表示
                updateHistory(data); // 全件をリストに表示
            }
        } catch (e) { console.error(e); }
    }

    // 3. メインUIの更新と波形描画データのセット
    function updateUI(data) {
        if (!data || !data.earthquake) return;
        const eq = data.earthquake;
        const shindoBox = document.getElementById('max-int');
        
        // 発生時刻のパース
        let timeStr = "--:--";
        let originTime = 0;
        if (eq.time) {
            const date = new Date(eq.time);
            timeStr = `${String(date.getHours()).padStart(2,'0')}時${String(date.getMinutes()).padStart(2,'0')}分`;
            originTime = date.getTime();
        }
        
        document.getElementById('hypocenter').innerText = eq.hypocenter.name || "調査中";
        document.getElementById('time-display').innerText = `${timeStr}頃 発生`;
        document.getElementById('mag').innerText = "M" + (eq.hypocenter.magnitude || "--");
        
        let depth = eq.hypocenter.depth || "--";
        document.getElementById('depth').innerText = (depth === "ごく浅い" || depth === "--") ? depth : depth + "km";

        // 震度表示と色分け
        const intensity = eq.maxScale;
        shindoBox.innerText = scaleMap[intensity] || "--";
        shindoBox.className = "shindo-box " + (classMap[intensity] || "int-default");

        // 波形描画エンジンにデータをセット (3分以内の地震のみ)
        const elapsed = (Date.now() - originTime) / 1000;
        if (originTime > 0 && elapsed > 0 && elapsed < 180 && eq.hypocenter.latitude && eq.hypocenter.longitude) {
            currentEvent = {
                originTime: originTime,
                lat: eq.hypocenter.latitude,
                lng: eq.hypocenter.longitude
            };
        } else {
            currentEvent = null;
        }

        document.getElementById('status-display').innerText = `${timeStr}頃 地震がありました`;
    }

    // 4. 履歴リストの更新
    function updateHistory(historyData) {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        historyData.forEach(item => {
            if (!item.earthquake) return;
            const eq = item.earthquake;
            const date = new Date(eq.time);
            const time = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
            
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span>${time} ${eq.hypocenter.name}</span>
                <span class="history-shindo ${classMap[eq.maxScale] || ''}">${scaleMap[eq.maxScale] || '-'}</span>
            `;
            list.appendChild(div);
        });
    }

    // 5. P波・S波の Canvas 描画エンジン
    function drawWaves() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (currentEvent) {
            const elapsed = (Date.now() - currentEvent.originTime) / 1000;
            
            if (elapsed > 0 && elapsed < 180) {
                // 日本地図の座標変換 (強震モニタ画像に合わせる)
                // 範囲：北緯30〜46度、東経128〜146度
                const mapX = (currentEvent.lng - 128) * (canvas.width / (146 - 128));
                const mapY = (46 - currentEvent.lat) * (canvas.height / (46 - 30));

                // ピクセル/km スケール (簡易計算：1度を約111kmとする)
                const scalePixelPerKm = (canvas.height / 16) / 111; 

                // P波 (青い細い円) - 速い (~7km/s)
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(mapX, mapY, elapsed * 7.0 * scalePixelPerKm, 0, Math.PI * 2);
                ctx.stroke();

                // S波 (赤い太い円) - 遅い (~4km/s)
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(mapX, mapY, elapsed * 4.0 * scalePixelPerKm, 0, Math.PI * 2); 
                ctx.stroke();
                
                // 震源地 (×印)
                ctx.fillStyle = 'red';
                ctx.font = 'bold 20px DotGothic16';
                ctx.fillText('×', mapX - 8, mapY + 8);
            }
        }
        requestAnimationFrame(drawWaves); // 毎フレーム描画
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }

    window.onresize = resize;
    resize();
    updateKmoni();
    fetchP2P();
    drawWaves();
    setInterval(updateKmoni, 3000); 
    setInterval(fetchP2P, 15000); // 15秒に1回更新
</script>
</body>
</html>
