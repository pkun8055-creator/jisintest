<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地震情報 for geminj</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #111; --accent: #ff3333; --font: 'DotGothic16', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: var(--font); overflow: hidden; display: flex; flex-direction: column; }
        
        /* PCレイアウト */
        @media (min-width: 768px) { body { flex-direction: row; } }

        /* アラート点滅（発生から3分以内のみ） */
        @keyframes alert-border {
            0%, 100% { box-shadow: inset 0 0 0px #f00; background: #000; }
            50% { box-shadow: inset 0 0 40px #f00; background: #300; }
        }
        .alerting { animation: alert-border 1s infinite; }

        /* マップエリア：画面に合わせて伸縮 */
        #map-viewport { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000;
            width: 100%;
        }
        
        #map-stage { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }
        
        .kmoni-layer { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* 画面サイズに自動で合わせる */
            filter: brightness(1.2); 
            opacity: 0; 
            z-index: 1; 
        }
        .active { opacity: 1; z-index: 2; }

        #wave-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 情報パネル：スマホでは下、PCでは右 */
        #info-panel { 
            background: var(--panel); 
            border-top: 2px solid #333; 
            padding: 15px; 
            z-index: 10; 
            height: 280px; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
        }
        
        @media (min-width: 768px) { 
            #info-panel { width: 360px; height: 100%; border-top: none; border-left: 2px solid #333; } 
        }
        
        .shindo-box { background: var(--accent); font-size: 5rem; text-align: center; border-radius: 4px; font-weight: 900; margin: 5px 0; line-height: 1.1; border: 2px solid #fff; }
    </style>
</head>
<body id="main-body">

<div id="map-viewport">
    <div id="map-stage">
        <img id="kmoni-1" class="kmoni-layer active">
        <img id="kmoni-2" class="kmoni-layer">
        <canvas id="wave-canvas"></canvas>
    </div>
</div>

<div id="info-panel">
    <div id="status-display" style="font-size: 0.9rem; color: #888; margin-bottom: 5px;">待機中...</div>
    <div id="hypocenter" style="font-size: 1.6rem; font-weight: bold; border-bottom: 1px solid #444;">---</div>
    <div id="time-display" style="font-size: 1.1rem; margin: 5px 0;">--時--分頃</div>
    
    <div style="color: var(--accent); font-size: 0.8rem; font-weight: bold;">MAX INTENSITY</div>
    <div id="max-int" class="shindo-box">--</div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div><div style="color:#888; font-size:0.7rem;">MAGNITUDE</div><div id="mag" style="font-size:1.4rem;">--</div></div>
        <div><div style="color:#888; font-size:0.7rem;">DEPTH</div><div id="depth" style="font-size:1.4rem;">--</div></div>
    </div>
    
    <div style="margin-top:auto; font-size:0.8rem; color:#444; text-align:right;">
        CLOCK: <span id="clock">00:00:00</span>
    </div>
</div>

<script>
    let activeLayer = 1;
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');
    let currentEEW = null; let lastEventId = "";

    function updateKmoni() {
        const now = new Date(Date.now() - 25000);
        const Y = now.getFullYear();
        const M = String(now.getMonth() + 1).padStart(2, '0');
        const D = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        
        const rawUrl = `www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${Y}${M}${D}/${Y}${M}${D}${h}${m}${s}.jma_s.gif`;
        const nextUrl = `https://images.weserv.nl/?url=${rawUrl}&noshp`;

        const nextLayerNum = activeLayer === 1 ? 2 : 1;
        const nextImg = document.getElementById(`kmoni-${nextLayerNum}`);
        const currentImg = document.getElementById(`kmoni-${activeLayer}`);

        nextImg.onload = () => {
            nextImg.style.opacity = 1;
            nextImg.classList.add('active');
            currentImg.classList.remove('active');
            activeLayer = nextLayerNum;
        };
        nextImg.src = nextUrl;
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    async function fetchEEW() {
        try {
            const res = await fetch('https://api.wolfx.jp/jma_eew.json');
            const data = await res.json();
            
            const mainBody = document.getElementById('main-body');
            const statusDisplay = document.getElementById('status-display');

            if (data && data.Title !== "Dummy") {
                const originTime = new Date(data.OriginTime);
                const diffSec = (Date.now() - originTime.getTime()) / 1000;

                // 地震発生から180秒（3分）以内ならアラート表示
                if (diffSec < 180) {
                    mainBody.classList.add('alerting');
                    statusDisplay.innerText = "🔴 地震発生中 / EEW ACTIVE";
                    statusDisplay.style.color = "#ff3333";
                    
                    document.getElementById('hypocenter').innerText = data.Hypocenter;
                    document.getElementById('time-display').innerText = `${originTime.getHours()}時${originTime.getMinutes()}分頃`;
                    document.getElementById('max-int').innerText = data.MaxIntensity;
                    document.getElementById('mag').innerText = "M" + data.Magunitude;
                    document.getElementById('depth').innerText = data.Depth + "km";
                    
                    if (data.EventID !== lastEventId) {
                        currentEEW = data; lastEventId = data.EventID;
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    }
                } else {
                    // 3分過ぎたら画面を通常に戻す
                    resetDisplay();
                }
            } else {
                resetDisplay();
            }
        } catch (e) {}
    }

    function resetDisplay() {
        document.getElementById('main-body').classList.remove('alerting');
        document.getElementById('status-display').innerText = "待機中 / NORMAL";
        document.getElementById('status-display').style.color = "#888";
        // 文字情報はあえて残さず、クリアしたい場合はここで書き換えてください
    }

    function drawWaves() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentEEW) {
            const elapsed = (Date.now() - new Date(currentEEW.OriginTime).getTime()) / 1000;
            // 3分経過したら波紋を消す
            if (elapsed > 0 && elapsed < 180) {
                const mapX = (parseFloat(currentEEW.Longitude) - 137.5) * (canvas.width / 16) + (canvas.width / 2);
                const mapY = (37.5 - parseFloat(currentEEW.Latitude)) * (canvas.height / 11) + (canvas.height / 2);
                ctx.strokeStyle = 'cyan'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(mapX, mapY, elapsed * 30, 0, Math.PI * 2); ctx.stroke();
                ctx.strokeStyle = 'red'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(mapX, mapY, elapsed * 18, 0, Math.PI * 2); ctx.stroke();
            }
        }
        requestAnimationFrame(drawWaves);
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }

    window.onresize = resize; resize();
    setInterval(updateKmoni, 2000); 
    setInterval(fetchEEW, 5000);
    updateKmoni(); fetchEEW(); drawWaves();
</script>
</body>
</html>
