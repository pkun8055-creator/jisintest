<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Quake - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #111; --accent: #ff3333; --font: 'DotGothic16', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: var(--font); overflow: hidden; display: flex; flex-direction: column; }
        @media (min-width: 768px) { body { flex-direction: row; } }

        /* 警報時のアニメーション */
        @keyframes alert-border { 0%, 100% { box-shadow: inset 0 0 0px #f00; background: #000; } 50% { box-shadow: inset 0 0 40px #f00; background: #300; } }
        .alerting { animation: alert-border 1s infinite; }

        #map-viewport { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
        #map-stage { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .kmoni-layer { position: absolute; width: 100%; height: 100%; object-fit: contain; filter: brightness(1.2); opacity: 0; z-index: 1; transition: opacity 0.3s; }
        .active { opacity: 1; z-index: 2; }

        /* 右側パネル */
        #info-panel { background: var(--panel); border-top: 2px solid #333; padding: 15px; z-index: 10; height: 450px; display: flex; flex-direction: column; box-sizing: border-box; }
        @media (min-width: 768px) { #info-panel { width: 360px; height: 100%; border-top: none; border-left: 2px solid #333; } }
        
        #status-display { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; opacity: 0.8; }
        .shindo-box { background: var(--accent); font-size: 5rem; text-align: center; border-radius: 4px; font-weight: 900; margin: 5px 0; line-height: 1.1; border: 2px solid #fff; transition: background 0.5s; }
        
        /* 履歴リスト */
        #history-list { margin-top: 15px; flex: 1; overflow-y: auto; border-top: 1px dashed #444; padding-top: 10px; font-size: 0.85rem; }
        .history-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; }
        .history-shindo { font-weight: bold; width: 40px; text-align: center; border-radius: 2px; }

        /* 震度別カラー */
        .int-1, .int-2 { background: #4caf50 !important; color: white; } /* 緑 */
        .int-3, .int-4 { background: #fbc02d !important; color: black; } /* 黄 */
        .int-5, .int-55, .int-6, .int-65, .int-7 { background: #d32f2f !important; color: white; } /* 赤 */
    </style>
</head>
<body id="main-body">

<div id="map-viewport">
    <div id="map-stage">
        <img id="kmoni-1" class="kmoni-layer active" src="">
        <img id="kmoni-2" class="kmoni-layer" src="">
    </div>
</div>

<div id="info-panel">
    <div id="status-display">CONNECTED TO P2P...</div>
    <div id="hypocenter" style="font-size: 1.8rem; font-weight: bold; border-bottom: 1px solid #444;">---</div>
    <div id="time-display" style="font-size: 1.1rem; margin: 5px 0; color: #aaa;">--時--分頃 発生</div>
    
    <div style="font-size: 0.8rem; font-weight: bold;">最大震度</div>
    <div id="max-int" class="shindo-box">--</div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom: 10px;">
        <div><div style="color:#888; font-size:0.7rem;">MAGNITUDE</div><div id="mag" style="font-size:1.4rem;">--</div></div>
        <div><div style="color:#888; font-size:0.7rem;">DEPTH</div><div id="depth" style="font-size:1.4rem;">--</div></div>
    </div>

    <div style="font-size: 0.8rem; color: #888;">過去の履歴</div>
    <div id="history-list"></div>
    
    <div style="margin-top:auto; font-size:0.8rem; color:#444; text-align:right;">
        CLOCK: <span id="clock">00:00:00</span>
    </div>
</div>

<script>
    let activeLayerNum = 1;
    const scaleMap = { 10: "1", 20: "2", 30: "3", 40: "4", 45: "5弱", 50: "5強", 55: "6弱", 60: "6強", 70: "7" };
    const classMap = { 10: "int-1", 20: "int-2", 30: "int-3", 40: "int-4", 45: "int-5", 50: "int-55", 55: "int-6", 60: "int-65", 70: "int-7" };

    function updateKmoni() {
        const now = new Date(Date.now() - 25000);
        const Y = now.getFullYear();
        const M = String(now.getMonth() + 1).padStart(2, '0');
        const D = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const nextUrl = `https://images.weserv.nl/?url=www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${Y}${M}${D}/${Y}${M}${D}${h}${m}${s}.jma_s.gif&noshp`;

        const nextNum = (activeLayerNum === 1) ? 2 : 1;
        const nextImg = document.getElementById(`kmoni-${nextNum}`);
        const currentImg = document.getElementById(`kmoni-${activeLayerNum}`);

        nextImg.onload = () => {
            nextImg.style.opacity = 1;
            nextImg.classList.add('active');
            currentImg.style.opacity = 0;
            currentImg.classList.remove('active');
            activeLayerNum = nextNum;
        };
        nextImg.src = nextUrl;
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    async function fetchP2P() {
        try {
            // 最新5件を取得
            const res = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=5');
            const data = await res.json();
            if (data && data.length > 0) {
                updateUI(data[0]); // 最新の1件をメインに表示
                updateHistory(data.slice(1)); // 2件目以降をリストに表示
            }
        } catch (e) { console.error(e); }
    }

    function updateUI(data) {
        if (!data || !data.earthquake) return;
        const eq = data.earthquake;
        const shindoBox = document.getElementById('max-int');
        
        let timeStr = "--:--";
        if (eq.time) {
            const date = new Date(eq.time);
            timeStr = `${String(date.getHours()).padStart(2,'0')}時${String(date.getMinutes()).padStart(2,'0')}分`;
        }
        
        document.getElementById('hypocenter').innerText = eq.hypocenter.name || "調査中";
        document.getElementById('time-display').innerText = `${timeStr}頃 発生`;
        document.getElementById('mag').innerText = "M" + (eq.hypocenter.magnitude || "--");
        
        let depth = eq.hypocenter.depth || "--";
        document.getElementById('depth').innerText = (depth === "ごく浅い" || depth === "--") ? depth : depth + "km";

        // 震度表示と色分け
        const intensity = eq.maxScale;
        shindoBox.innerText = scaleMap[intensity] || "--";
        shindoBox.className = "shindo-box " + (classMap[intensity] || "");

        document.getElementById('status-display').innerText = `${timeStr}頃 地震がありました`;
    }

    function updateHistory(historyData) {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        historyData.forEach(item => {
            if (!item.earthquake) return;
            const eq = item.earthquake;
            const date = new Date(eq.time);
            const time = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
            
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span>${time} ${eq.hypocenter.name}</span>
                <span class="history-shindo ${classMap[eq.maxScale] || ''}">${scaleMap[eq.maxScale] || '-'}</span>
            `;
            list.appendChild(div);
        });
    }

    function resize() {
        const canvas = document.createElement('canvas'); // ダミー用
        const mapStage = document.getElementById('map-stage');
    }

    window.onresize = resize;
    resize();
    updateKmoni();
    fetchP2P();
    setInterval(updateKmoni, 3000); 
    setInterval(fetchP2P, 15000);
</script>
</body>
</html>
