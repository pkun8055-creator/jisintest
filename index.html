<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>testhtml</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #111111;
            --accent: #ff3333;
            --text: #ffffff;
        }

        /* --- ベースレイアウト --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column; /* スマホ: 縦並び */
        }

        @media (min-width: 768px) {
            body { flex-direction: row; } /* PC: 横並び */
        }

        /* --- マップエリア --- */
        #map-viewport {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        #map-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 2;
        }

        #kmoni-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: brightness(1.2) contrast(1.1);
            pointer-events: none;
            user-select: none;
        }

        #wave-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* --- 情報パネル --- */
        #info-panel {
            background: var(--panel-bg);
            border-top: 2px solid #333;
            padding: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 250px;
        }

        @media (min-width: 768px) {
            #info-panel {
                width: 350px;
                height: 100%;
                border-top: none;
                border-left: 2px solid #333;
            }
        }

        .label { color: #888; font-size: 0.75rem; letter-spacing: 1px; }
        #hypocenter { font-size: 1.6rem; margin: 5px 0; font-weight: bold; }
        
        .shindo-box {
            background: var(--accent);
            color: white;
            font-size: 4rem;
            text-align: center;
            border-radius: 8px;
            padding: 5px;
            font-weight: 900;
            margin: 10px 0;
            line-height: 1;
        }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .val { font-size: 1.1rem; font-weight: bold; }

        .footer { margin-top: auto; font-size: 0.7rem; color: #444; text-align: right; }
    </style>
</head>
<body>

<div id="map-viewport">
    <div id="map-stage">
        <img id="kmoni-img" src="" alt="地図読込中...">
        <canvas id="wave-canvas"></canvas>
    </div>
</div>

<div id="info-panel">
    <div class="label" style="color:var(--accent)">EARTHQUAKE REPORT</div>
    <div id="hypocenter">待機中...</div>
    
    <div class="label">最大震度</div>
    <div id="max-int" class="shindo-box">--</div>

    <div class="data-grid">
        <div>
            <div class="label">規模</div>
            <div id="mag" class="val">--</div>
        </div>
        <div>
            <div class="label">深さ</div>
            <div id="depth" class="val">--</div>
        </div>
    </div>

    <div class="footer">
        Realtime: <span id="clock">00:00:00</span>
    </div>
</div>

<script>
    const stage = document.getElementById('map-stage');
    const kmoniImg = document.getElementById('kmoni-img');
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    let currentEEW = null;
    let lastEventId = "";
    let scale = 1;

    // --- 1. 画像更新 (HTTPS対応プロキシを使用) ---
    function updateKmoni() {
        // 安定のため15秒前の画像を取得
        const now = new Date(Date.now() - 15000);
        const Y = now.getFullYear();
        const M = String(now.getMonth() + 1).padStart(2, '0');
        const D = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        
        // 防災科研のURL（httpなのでGitHub Pagesでは直接読み込めない）
        const rawUrl = `www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${Y}${M}${D}/${Y}${M}${D}${h}${m}${s}.jma_s.gif`;
        
        // weserv.nlプロキシを介してHTTPSとして読み込む
        kmoniImg.src = `https://images.weserv.nl/?url=${rawUrl}&noshp`;
        
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }

    // --- 2. 地震速報取得 ---
    async function fetchEEW() {
        try {
            const res = await fetch('https://api.wolfx.jp/jma_eew.json');
            const data = await res.json();
            if (!data || data.Title === "Dummy") return;

            if (data.EventID !== lastEventId) {
                document.getElementById('hypocenter').innerText = data.Hypocenter;
                document.getElementById('max-int').innerText = data.MaxIntensity;
                document.getElementById('mag').innerText = "M" + data.Magunitude;
                document.getElementById('depth').innerText = data.Depth + "km";
                
                // 自動ズーム発動
                focusHypocenter(data.Latitude, data.Longitude);
                currentEEW = data;
                lastEventId = data.EventID;
            }
        } catch (e) { console.error(e); }
    }

    // --- 3. 自動ズーム計算 ---
    function focusHypocenter(lat, lon) {
        if (!lat || !lon) return;
        const targetX = (parseFloat(lon) - 137.5) * (window.innerWidth / 18); 
        const targetY = (37.5 - parseFloat(lat)) * (window.innerHeight / 12);

        scale = 1.8;
        stage.style.transform = `scale(${scale}) translate(${-targetX}px, ${-targetY}px)`;
    }

    // --- 4. 波紋描画 ---
    function drawWaves() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentEEW) {
            const lon = parseFloat(currentEEW.Longitude);
            const lat = parseFloat(currentEEW.Latitude);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const mapX = (lon - 137.5) * (canvas.width / 18) + centerX;
            const mapY = (37.5 - lat) * (canvas.height / 12) + centerY;

            const originTime = new Date(currentEEW.OriginTime).getTime();
            const elapsed = (Date.now() - originTime) / 1000;

            if (elapsed > 0 && elapsed < 180) {
                ctx.beginPath();
                ctx.arc(mapX, mapY, elapsed * 40, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0, 180, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(mapX, mapY, elapsed * 22, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 50, 50, 0.8)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }
        requestAnimationFrame(drawWaves);
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }

    window.onresize = resize;
    resize();
    setInterval(updateKmoni, 2000); // 2秒ごとに地図更新
    setInterval(fetchEEW, 5000);    // 5秒ごとに速報チェック
    updateKmoni();
    fetchEEW();
    drawWaves();
</script>
</body>
</html>
