<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震・強震 統合モニタ（4画面レイアウト）</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        /* 3列のグリッド設定（左50%、右の2つを25%ずつ） */
        .container {
            display: grid;
            grid-template-columns: 50% 25% 25%; 
            grid-template-rows: 200px 1fr; 
            height: 100vh;
            width: 100vw;
            gap: 2px;
        }

        /* 左側の巨大な枠（縦にぶち抜く） */
        .box-left {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
            background: #111;
        }

        /* 右上の時計の枠（右側の2列分を結合して広く使う） */
        .box-top-right {
            grid-column: 2 / 4;
            grid-row: 1 / 2;
            background: #111;
        }

        /* 右下 左側の強震モニタ */
        .box-bottom-1 {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        /* 右下 右側の強震モニタ（長周期切り替え用） */
        .box-bottom-2 {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        .normal-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 強震モニタ用の縮小設定（2つ並べるため 0.65倍 に調整） */
        .scaled-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;   /* 1 ÷ 0.65 ≒ 153% */
            height: 100%;
            border: none;
            transform: scale(1);
            transform-origin: 0 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box-left">
        <iframe class="normal-iframe" src="https://kotoho7.github.io/scratch-realtime-earthquake-viewer-page/"></iframe>
    </div>

    <div class="box-top-right">
        <iframe class="normal-iframe" src="https://digital.onl.jp/"></iframe>
    </div>

    <div class="box-bottom-1">
        <iframe class="scaled-iframe" src="http://www.kmoni.bosai.go.jp/"></iframe>
    </div>

    <div class="box-bottom-2">
        <iframe class="scaled-iframe" src="http://www.kmoni.bosai.go.jp/"></iframe>
    </div>
</div>

</body>
</html>
